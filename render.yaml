databases:
  - name: dna-erp-db
    plan: free
    region: singapore
    postgresMajorVersion: '16'

services:
  - type: web
    name: dna-erp-be
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api
      - key: DATABASE_URL
        fromDatabase:
          name: dna-erp-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: THROTTLE_TTL
        value: '60'
      - key: THROTTLE_LIMIT
        value: '100'
      - key: LOG_LEVEL
        value: info
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
